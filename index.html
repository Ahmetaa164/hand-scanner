<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
  color:#00ffcc;
}

video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter: brightness(0.3);
}

#status {
  position:absolute;
  top:20px;
  left:20px;
  font-size:22px;
  text-shadow:0 0 10px #00ffcc;
}

/* Scan line */
.scan {
  position:absolute;
  width:100%;
  height:3px;
  background:#00ffcc;
  box-shadow:0 0 20px #00ffcc;
  animation:scan 2s linear infinite;
}

@keyframes scan {
  0% { top:0; }
  100% { top:100%; }
}

/* Progress */
.progress {
  position:absolute;
  bottom:40px;
  left:20px;
  width:80%;
  height:10px;
  border:1px solid #00ffcc;
}

.bar {
  height:100%;
  width:0%;
  background:#00ffcc;
}

/* Radar */
.radar {
  position:absolute;
  right:20px;
  top:20px;
  width:120px;
  height:120px;
  border:2px solid #00ffcc;
  border-radius:50%;
}

.radar::after {
  content:'';
  position:absolute;
  width:2px;
  height:100%;
  background:#00ffcc;
  left:50%;
  transform-origin:bottom;
  animation:rotate 2s linear infinite;
}

@keyframes rotate {
  0% { transform:rotate(0deg); }
  100% { transform:rotate(360deg); }
}

/* Grafik */
.graph {
  position:absolute;
  right:20px;
  bottom:40px;
  width:120px;
  height:80px;
  display:flex;
  gap:5px;
}

.barGraph {
  width:10px;
  background:#00ffcc;
  animation:grow 1s infinite alternate;
}

@keyframes grow {
  from { height:20%; }
  to { height:100%; }
}

</style>
</head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<body>

<div id="status">PLACE OPEN HAND</div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div class="scan"></div>
<div class="radar"></div>

<div class="graph">
  <div class="barGraph"></div>
  <div class="barGraph"></div>
  <div class="barGraph"></div>
  <div class="barGraph"></div>
  <div class="barGraph"></div>
</div>

<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video = document.getElementById('video');
const statusText = document.getElementById('status');
const bar = document.getElementById('bar');

let progress = 0;
let scanning = false;

/* 🔊 Bip sesi */
function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.frequency.value = 800;
  osc.start();
  setTimeout(() => osc.stop(), 100);
}

/* ✋ Açık el kontrolü */
function isHandOpen(landmarks) {
  return landmarks[8].y < landmarks[6].y &&
         landmarks[12].y < landmarks[10].y;
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7
});

hands.onResults(results => {

  if (results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];

    if (isHandOpen(hand)) {
      scanning = true;
    } else {
      scanning = false;
      statusText.innerText = "HAND NOT VALID";
      progress = 0;
      bar.style.width = "0%";
    }

  } else {
    scanning = false;
    progress = 0;
    bar.style.width = "0%";
    statusText.innerText = "PLACE OPEN HAND";
  }
});

function update() {

  if (scanning) {
    progress += 1;
    bar.style.width = progress + "%";
    statusText.innerText = "SCANNING... " + progress + "%";

    if (progress % 20 === 0) beep();

    if (progress >= 100) {
      statusText.innerText = "ACCESS GRANTED";
      beep();
    }

  }

  requestAnimationFrame(update);
}

update();

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 640,
  height: 480
});

camera.start();

</script>

</body>
</html>
